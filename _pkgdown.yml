url: https://matheuspasche.github.io/creditools

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: "creditools — Credit Risk Policy Simulation"
  description: >
    A powerful R framework for simulating and optimizing credit policies.
    Multi-stage funnels, efficient frontier analysis, and stable Risk Based
    Pricing matrices via Ward Agglomerative Clustering.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/matheuspasche/creditools

reference:
  - title: "Sample Data"
    desc: "Synthetic data generation for testing and development."
    contents:
      - generate_sample_data

  - title: "Credit Policy"
    desc: "Build and configure a simulation policy."
    contents:
      - credit_policy
      - stage_cutoff
      - stage_rate
      - stage_filter
      - stress_aggravation

  - title: "Simulation Engines"
    desc: "Run single or grid-sweep simulations."
    contents:
      - run_simulation
      - run_tradeoff_analysis
      - summarize_results

  - title: "Risk Group Clustering"
    desc: "Ward Agglomerative Clustering for stable Risk Based Pricing matrices."
    contents:
      - find_risk_groups
      - find_pairwise_risk_groups

articles:
  - title: "Case Study"
    navbar: ~
    contents:
      - case-study-used-vehicles

news:
  releases:
    - text: "v0.3.0"
      href: https://github.com/matheuspasche/creditools/releases/tag/v0.3.0

authors:
  Matheus Pasche:
    href: https://github.com/matheuspasche
